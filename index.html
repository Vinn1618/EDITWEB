<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <meta name="theme-color" content="#050505">
    <title>Frame Akun Premium</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;500;600;700;800;900&family=Rajdhani:wght@500;600;700&display=swap" rel="stylesheet">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            -webkit-tap-highlight-color: transparent;
            -webkit-font-smoothing: antialiased;
            -moz-osx-font-smoothing: grayscale;
        }

        :root {
            --gold: #FFD700;
            --gold-dark: #B8860B;
            --gold-light: #FFE55C;
            --black: #050505;
            --dark: #0a0a0a;
            --gray: #141414;
            --gray-light: #1f1f1f;
            --text: #ffffff;
            --text-muted: #666666;
        }

        html, body {
            height: 100%;
            background: var(--black);
            color: var(--text);
            font-family: 'Rajdhani', sans-serif;
            overflow-x: hidden;
        }

        .app {
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            background: var(--black);
        }

        /* Header */
        .header {
            position: fixed;
            top: 0;
            left: 0;
            right: 0;
            z-index: 1000;
            background: rgba(5, 5, 5, 0.98);
            backdrop-filter: blur(20px);
            border-bottom: 1px solid rgba(255, 215, 0, 0.1);
            padding: 12px 16px;
        }

        .header-content {
            max-width: 600px;
            margin: 0 auto;
        }

        .header-top {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 12px;
        }

        .brand {
            font-family: 'Orbitron', sans-serif;
            font-size: 18px;
            font-weight: 800;
            letter-spacing: 2px;
            background: linear-gradient(135deg, var(--gold) 0%, var(--gold-light) 100%);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }

        .lock-toggle {
            display: flex;
            align-items: center;
            gap: 8px;
            padding: 8px 14px;
            background: var(--gray);
            border: 1px solid rgba(255, 255, 255, 0.1);
            border-radius: 8px;
            cursor: pointer;
            transition: all 0.2s;
        }

        .lock-toggle:active {
            transform: scale(0.95);
        }

        .lock-toggle.locked {
            background: rgba(255, 215, 0, 0.15);
            border-color: var(--gold);
        }

        .lock-icon {
            width: 18px;
            height: 18px;
            color: var(--text-muted);
        }

        .lock-toggle.locked .lock-icon {
            color: var(--gold);
        }

        .lock-text {
            font-size: 12px;
            font-weight: 700;
            text-transform: uppercase;
            letter-spacing: 1px;
            color: var(--text-muted);
        }

        .lock-toggle.locked .lock-text {
            color: var(--gold);
        }

        .controls {
            display: flex;
            gap: 8px;
            overflow-x: auto;
            padding-bottom: 4px;
            scrollbar-width: none;
        }

        .controls::-webkit-scrollbar {
            display: none;
        }

        .btn {
            flex-shrink: 0;
            display: flex;
            align-items: center;
            gap: 6px;
            padding: 10px 16px;
            background: var(--gray-light);
            border: 1px solid rgba(255, 255, 255, 0.1);
            border-radius: 10px;
            color: var(--text);
            font-family: 'Rajdhani', sans-serif;
            font-size: 13px;
            font-weight: 700;
            text-transform: uppercase;
            letter-spacing: 1px;
            cursor: pointer;
            transition: all 0.15s;
        }

        .btn:active {
            transform: scale(0.96);
        }

        .btn.active {
            background: var(--gold);
            border-color: var(--gold);
            color: var(--black);
        }

        .btn-icon {
            width: 16px;
            height: 16px;
        }

        /* Main */
        .main {
            flex: 1;
            padding: 100px 16px 40px;
            display: flex;
            justify-content: center;
            align-items: flex-start;
            background: var(--black);
        }

        /* Frame Container */
        .frame-container {
            width: 100%;
            transition: max-width 0.3s ease;
        }

        .frame-container.mode-169 {
            max-width: 600px;
        }

        .frame-container.mode-916 {
            max-width: 375px;
        }

        .frame-container.mode-11 {
            max-width: 500px;
        }

        /* Frame Card */
        .frame-card {
            width: 100%;
            background: linear-gradient(180deg, var(--gray) 0%, var(--dark) 100%);
            border-radius: 24px;
            position: relative;
            overflow: hidden;
            box-shadow: 0 50px 100px -20px rgba(0, 0, 0, 0.8);
        }

        .frame-border {
            position: absolute;
            inset: 0;
            border-radius: 24px;
            padding: 2px;
            background: linear-gradient(135deg, var(--gold-dark) 0%, var(--gold) 50%, var(--gold-light) 100%);
            -webkit-mask: linear-gradient(#fff 0 0) content-box, linear-gradient(#fff 0 0);
            mask: linear-gradient(#fff 0 0) content-box, linear-gradient(#fff 0 0);
            -webkit-mask-composite: xor;
            mask-composite: exclude;
            pointer-events: none;
        }

        .corner {
            position: absolute;
            width: 40px;
            height: 40px;
            border: 2px solid var(--gold);
            opacity: 0.6;
            pointer-events: none;
            z-index: 10;
        }

        .corner-tl { top: 20px; left: 20px; border-right: 0; border-bottom: 0; }
        .corner-tr { top: 20px; right: 20px; border-left: 0; border-bottom: 0; }
        .corner-bl { bottom: 20px; left: 20px; border-right: 0; border-top: 0; }
        .corner-br { bottom: 20px; right: 20px; border-left: 0; border-top: 0; }

        /* Card Header */
        .card-header {
            padding: 32px 24px 20px;
            text-align: center;
        }

        .badge {
            display: inline-flex;
            align-items: center;
            gap: 6px;
            padding: 6px 16px;
            background: rgba(255, 215, 0, 0.1);
            border: 1px solid rgba(255, 215, 0, 0.3);
            border-radius: 20px;
            margin-bottom: 16px;
        }

        .badge-icon {
            width: 14px;
            height: 14px;
            color: var(--gold);
        }

        .badge-text {
            font-family: 'Orbitron', sans-serif;
            font-size: 10px;
            font-weight: 700;
            text-transform: uppercase;
            letter-spacing: 2px;
            color: var(--gold);
        }

        .title-input {
            width: 100%;
            background: transparent;
            border: none;
            color: var(--text);
            font-family: 'Orbitron', sans-serif;
            font-size: 24px;
            font-weight: 800;
            text-align: center;
            text-transform: uppercase;
            letter-spacing: 1px;
            outline: none;
            padding: 8px;
        }

        /* Image Section with Crop Support */
        .image-section {
            margin: 0 24px 24px;
            position: relative;
            background: var(--gray-light);
            border-radius: 16px;
            overflow: hidden;
            border: 2px dashed rgba(255, 255, 255, 0.1);
            transition: all 0.3s ease;
        }

        .image-section.has-image {
            border-style: solid;
            border-color: rgba(255, 215, 0, 0.4);
        }

        .image-section.ratio-169 {
            aspect-ratio: 16/9;
        }

        .image-section.ratio-916 {
            aspect-ratio: 9/16;
        }

        .image-section.ratio-11 {
            aspect-ratio: 1/1;
        }

        .image-wrapper {
            width: 100%;
            height: 100%;
            position: relative;
            overflow: hidden;
            display: none;
        }

        .image-wrapper.active {
            display: block;
        }

        .image-inner {
            width: 100%;
            height: 100%;
            position: relative;
            cursor: grab;
        }

        .image-inner:active {
            cursor: grabbing;
        }

        .image-inner.crop-mode {
            overflow: visible;
        }

        .preview-image {
            width: 100%;
            height: 100%;
            object-fit: cover;
            display: block;
            transition: transform 0.1s linear;
            will-change: transform;
        }

        .preview-image.crop-active {
            object-fit: none;
            max-width: none;
            max-height: none;
            width: auto;
            height: auto;
            min-width: 100%;
            min-height: 100%;
        }

        .upload-placeholder {
            position: absolute;
            inset: 0;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            gap: 12px;
            color: var(--text-muted);
            cursor: pointer;
        }

        .upload-icon {
            width: 48px;
            height: 48px;
            opacity: 0.4;
        }

        .upload-text {
            font-family: 'Orbitron', sans-serif;
            font-size: 14px;
            font-weight: 600;
            text-transform: uppercase;
            letter-spacing: 1px;
        }

        .upload-hint {
            font-size: 12px;
            opacity: 0.6;
        }

        /* Image Actions */
        .image-actions {
            display: flex;
            gap: 8px;
            margin-top: 12px;
            padding: 0 24px;
        }

        .img-btn {
            flex: 1;
            padding: 10px;
            background: var(--gray-light);
            border: 1px solid rgba(255, 255, 255, 0.1);
            border-radius: 8px;
            color: var(--text);
            font-family: 'Rajdhani', sans-serif;
            font-size: 12px;
            font-weight: 700;
            text-transform: uppercase;
            cursor: pointer;
            transition: all 0.2s;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 6px;
        }

        .img-btn:active {
            transform: scale(0.98);
        }

        .img-btn.active {
            background: rgba(255, 215, 0, 0.15);
            border-color: var(--gold);
            color: var(--gold);
        }

        .img-btn.delete {
            color: #ff4444;
            border-color: rgba(255, 68, 68, 0.3);
        }

        .img-btn:disabled {
            opacity: 0.3;
            pointer-events: none;
        }

        .img-btn svg {
            width: 14px;
            height: 14px;
        }

        /* Crop Instructions */
        .crop-instructions {
            position: absolute;
            bottom: 12px;
            left: 50%;
            transform: translateX(-50%);
            background: rgba(0, 0, 0, 0.7);
            color: var(--text);
            padding: 6px 12px;
            border-radius: 20px;
            font-size: 11px;
            font-weight: 600;
            text-transform: uppercase;
            letter-spacing: 1px;
            pointer-events: none;
            opacity: 0;
            transition: opacity 0.3s;
            z-index: 100;
        }

        .crop-instructions.show {
            opacity: 1;
        }

        /* Toggle Section */
        .toggle-section {
            padding: 0 24px 16px;
        }

        .toggle-btn {
            width: 100%;
            display: flex;
            align-items: center;
            justify-content: space-between;
            padding: 14px 18px;
            background: var(--gray-light);
            border: 1px solid rgba(255, 255, 255, 0.1);
            border-radius: 12px;
            color: var(--text);
            font-family: 'Rajdhani', sans-serif;
            font-size: 14px;
            font-weight: 700;
            text-transform: uppercase;
            letter-spacing: 1px;
            cursor: pointer;
        }

        .toggle-btn.active {
            background: rgba(255, 215, 0, 0.1);
            border-color: var(--gold);
            color: var(--gold);
        }

        .toggle-left {
            display: flex;
            align-items: center;
            gap: 10px;
        }

        .toggle-icon {
            width: 20px;
            height: 20px;
        }

        .toggle-status {
            font-size: 12px;
            color: var(--text-muted);
        }

        /* Stats Section */
        .stats-section {
            padding: 0 24px 24px;
            display: grid;
            grid-template-columns: repeat(2, 1fr);
            gap: 12px;
        }

        .stats-section.hidden {
            display: none;
        }

        .stat-box {
            background: var(--gray-light);
            border: 1px solid rgba(255, 255, 255, 0.05);
            border-radius: 12px;
            padding: 16px;
            text-align: center;
        }

        .stat-label {
            font-family: 'Orbitron', sans-serif;
            font-size: 10px;
            font-weight: 600;
            text-transform: uppercase;
            letter-spacing: 1px;
            color: var(--text-muted);
            margin-bottom: 6px;
        }

        .stat-input {
            width: 100%;
            background: transparent;
            border: none;
            color: var(--text);
            font-family: 'Orbitron', sans-serif;
            font-size: 20px;
            font-weight: 700;
            text-align: center;
            outline: none;
            text-transform: uppercase;
        }

        /* Description */
        .desc-section {
            padding: 0 24px 24px;
        }

        .section-header {
            display: flex;
            align-items: center;
            gap: 8px;
            margin-bottom: 12px;
        }

        .section-icon {
            width: 16px;
            height: 16px;
            color: var(--gold);
        }

        .section-title {
            font-family: 'Orbitron', sans-serif;
            font-size: 11px;
            font-weight: 700;
            text-transform: uppercase;
            letter-spacing: 2px;
            color: var(--text-muted);
        }

        .desc-input {
            width: 100%;
            min-height: 100px;
            background: var(--gray-light);
            border: 1px solid rgba(255, 255, 255, 0.1);
            border-radius: 12px;
            padding: 14px;
            color: var(--text);
            font-family: 'Rajdhani', sans-serif;
            font-size: 14px;
            font-weight: 500;
            line-height: 1.5;
            resize: vertical;
            outline: none;
        }

        .desc-input:focus {
            border-color: var(--gold);
        }

        /* Price Section */
        .price-section {
            margin: 0 24px 24px;
            background: linear-gradient(135deg, rgba(255, 215, 0, 0.15) 0%, rgba(255, 215, 0, 0.05) 100%);
            border: 2px solid var(--gold);
            border-radius: 16px;
            padding: 24px;
            text-align: center;
        }

        .price-label {
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 8px;
            margin-bottom: 8px;
        }

        .price-icon {
            width: 18px;
            height: 18px;
            color: var(--gold);
        }

        .price-text {
            font-family: 'Orbitron', sans-serif;
            font-size: 11px;
            font-weight: 700;
            text-transform: uppercase;
            letter-spacing: 2px;
            color: var(--gold);
        }

        .price-input {
            width: 100%;
            background: transparent;
            border: none;
            color: var(--gold);
            font-family: 'Orbitron', sans-serif;
            font-size: 36px;
            font-weight: 900;
            text-align: center;
            outline: none;
            text-transform: uppercase;
        }

        .price-note {
            margin-top: 8px;
            font-size: 12px;
            color: var(--text-muted);
        }

        /* Contact */
        .contact-section {
            padding: 0 24px 24px;
        }

        .contact-grid {
            display: grid;
            grid-template-columns: repeat(2, 1fr);
            gap: 12px;
        }

        .contact-item {
            background: var(--gray-light);
            border-radius: 12px;
            padding: 12px;
            display: flex;
            align-items: center;
            gap: 10px;
        }

        .contact-icon-box {
            width: 36px;
            height: 36px;
            background: rgba(255, 255, 255, 0.05);
            border-radius: 8px;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .contact-icon {
            width: 18px;
            height: 18px;
            color: var(--gold);
        }

        .contact-label {
            font-family: 'Orbitron', sans-serif;
            font-size: 9px;
            font-weight: 600;
            text-transform: uppercase;
            letter-spacing: 1px;
            color: var(--text-muted);
        }

        .contact-input {
            width: 100%;
            background: transparent;
            border: none;
            color: var(--text);
            font-family: 'Rajdhani', sans-serif;
            font-size: 14px;
            font-weight: 700;
            outline: none;
        }

        /* Footer */
        .card-footer {
            padding: 20px 24px;
            background: rgba(0, 0, 0, 0.3);
            border-top: 1px solid rgba(255, 255, 255, 0.05);
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .footer-text {
            font-family: 'Orbitron', sans-serif;
            font-size: 10px;
            font-weight: 600;
            text-transform: uppercase;
            letter-spacing: 1px;
            color: var(--text-muted);
        }

        .verified-badge {
            display: flex;
            align-items: center;
            gap: 6px;
            padding: 6px 12px;
            background: rgba(255, 215, 0, 0.1);
            border-radius: 20px;
        }

        .verified-icon {
            width: 14px;
            height: 14px;
            color: var(--gold);
        }

        .verified-text {
            font-family: 'Orbitron', sans-serif;
            font-size: 9px;
            font-weight: 700;
            text-transform: uppercase;
            letter-spacing: 1px;
            color: var(--gold);
        }

        /* Locked State */
        body.locked input,
        body.locked textarea,
        body.locked .upload-placeholder,
        body.locked .toggle-btn,
        body.locked .img-btn {
            pointer-events: none;
            user-select: none;
        }

       /* Screenshot Mode */
        body.screenshot-mode {
            background: var(--black);
        }

        body.screenshot-mode .header,
        body.screenshot-mode .image-actions,
        body.screenshot-mode .crop-instructions {
            display: none !important;
        }

        body.screenshot-mode .main {
            padding: 0;
            background: var(--black);
        }

        body.screenshot-mode .frame-container {
            max-width: none !important;
            width: 100vw;
        }

        body.screenshot-mode .frame-card {
            min-height: 100vh;
            border-radius: 0;
        }

        body.screenshot-mode .frame-border {
            border-radius: 0;
        }

        /* Reset Modal */
        .modal-overlay {
            position: fixed;
            inset: 0;
            background: rgba(0, 0, 0, 0.9);
            backdrop-filter: blur(10px);
            display: none;
            justify-content: center;
            align-items: center;
            z-index: 9999;
            opacity: 0;
            transition: opacity 0.3s ease;
        }

        .modal-overlay.active {
            display: flex;
            opacity: 1;
        }

        .modal-content {
            background: var(--gray);
            border: 1px solid rgba(255, 215, 0, 0.3);
            border-radius: 20px;
            padding: 32px 24px;
            width: 90%;
            max-width: 320px;
            text-align: center;
            transform: scale(0.9);
            transition: transform 0.3s ease;
        }

        .modal-overlay.active .modal-content {
            transform: scale(1);
        }

        .modal-icon {
            width: 64px;
            height: 64px;
            margin: 0 auto 20px;
            color: var(--gold);
            opacity: 0.8;
        }

        .modal-title {
            font-family: 'Orbitron', sans-serif;
            font-size: 20px;
            font-weight: 700;
            margin-bottom: 12px;
            text-transform: uppercase;
        }

        .modal-text {
            font-size: 14px;
            color: var(--text-muted);
            margin-bottom: 24px;
            line-height: 1.5;
        }

        .modal-buttons {
            display: flex;
            gap: 12px;
        }

        .modal-btn {
            flex: 1;
            padding: 14px;
            border: none;
            border-radius: 12px;
            font-family: 'Rajdhani', sans-serif;
            font-size: 14px;
            font-weight: 700;
            text-transform: uppercase;
            letter-spacing: 1px;
            cursor: pointer;
            transition: all 0.2s;
        }

        .modal-btn:active {
            transform: scale(0.96);
        }

        .modal-btn-cancel {
            background: var(--gray-light);
            color: var(--text);
            border: 1px solid rgba(255, 255, 255, 0.1);
        }

        .modal-btn-confirm {
            background: var(--gold);
            color: var(--black);
        }

        /* Toast */
        .toast {
            position: fixed;
            bottom: 30px;
            left: 50%;
            transform: translateX(-50%) translateY(100px);
            background: var(--gold);
            color: var(--black);
            padding: 12px 24px;
            border-radius: 30px;
            font-size: 13px;
            font-weight: 700;
            text-transform: uppercase;
            letter-spacing: 1px;
            opacity: 0;
            transition: all 0.3s ease;
            z-index: 9998;
        }

        .toast.show {
            transform: translateX(-50%) translateY(0);
            opacity: 1;
        }

        /* Hidden */
        input[type="file"] {
            display: none;
        }

        ::selection {
            background: var(--gold);
            color: var(--black);
        }
    </style>
</head>
<body>

    <div class="app">
        <!-- Header -->
        <header class="header" id="header">
            <div class="header-content">
                <div class="header-top">
                    <div class="brand">STOCK ADMIN</div>
                    
                    <div class="lock-toggle" id="lockToggle" onclick="toggleLock()">
                        <svg class="lock-icon" id="lockIcon" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M8 11V7a4 4 0 118 0m-4 8v2m-6 4h12a2 2 0 002-2v-6a2 2 0 00-2-2H6a2 2 0 00-2 2v6a2 2 0 002 2z"></path>
                        </svg>
                        <span class="lock-text" id="lockText">Edit</span>
                    </div>
                </div>

                <div class="controls">
                    <button class="btn active" onclick="setMode('169')" id="btn-169">
                        <svg class="btn-icon" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                            <rect x="2" y="6" width="20" height="12" rx="2" stroke-width="2"></rect>
                        </svg>
                        16:9
                    </button>
                    <button class="btn" onclick="setMode('916')" id="btn-916">
                        <svg class="btn-icon" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                            <rect x="8" y="2" width="8" height="20" rx="2" stroke-width="2"></rect>
                        </svg>
                        9:16
                    </button>
                    <button class="btn" onclick="setMode('11')" id="btn-11">
                        <svg class="btn-icon" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                            <rect x="3" y="3" width="18" height="18" rx="2" stroke-width="2"></rect>
                        </svg>
                        1:1
                    </button>
                    
                    <button class="btn" onclick="triggerUpload()">
                        <svg class="btn-icon" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 4v16m8-8H4"></path>

    <!-- Reset Modal -->
    <div class="modal-overlay" id="resetModal">
        <div class="modal-content">
            <svg class="modal-icon" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                <path stroke-linecap="round" stroke-linejoin="round" stroke-width="1.5" d="M12 9v2m0 4h.01m-6.938 4h13.856c1.54 0 2.502-1.667 1.732-3L13.732 4c-.77-1.333-2.694-1.333-3.464 0L3.34 16c-.77 1.333.192 3 1.732 3z"></path>
            </svg>
            <div class="modal-title">Reset Data?</div>
            <div class="modal-text">Semua data akan dihapus permanen.</div>
            <div class="modal-buttons">
                <button class="modal-btn modal-btn-cancel" onclick="hideResetModal()">Batal</button>
                <button class="modal-btn modal-btn-confirm" onclick="confirmReset()">Reset</button>
            </div>
        </div>
    </div>

    <!-- Toast -->
    <div class="toast" id="toast">Tersimpan</div>

     <script>
        // State
        let isLocked = false;
        let isScreenshotMode = false;
        let statsVisible = true;
        let currentMode = '169';
        let hasImage = false;
        let isCropMode = false;

        // Crop State
        let cropScale = 1;
        let cropTranslateX = 0;
        let cropTranslateY = 0;
        let isDragging = false;
        let startX = 0;
        let startY = 0;
        let initialTranslateX = 0;
        let initialTranslateY = 0;
        let initialDistance = 0;

        // Elements
        const frameContainer = document.getElementById('frameContainer');
        const imageSection = document.getElementById('imageSection');
        const uploadPlaceholder = document.getElementById('uploadPlaceholder');
        const imageWrapper = document.getElementById('imageWrapper');
        const imageInner = document.getElementById('imageInner');
        const previewImage = document.getElementById('previewImage');
        const imageActions = document.getElementById('imageActions');
        const cropBtn = document.getElementById('cropBtn');
        const cropBtnText = document.getElementById('cropBtnText');
        const cropInstructions = document.getElementById('cropInstructions');
        const fileInput = document.getElementById('fileInput');
        const toast = document.getElementById('toast');

        // Set Mode
        function setMode(mode) {
            currentMode = mode;
            
            document.querySelectorAll('.btn').forEach(btn => {
                if (btn.id && btn.id.startsWith('btn-')) btn.classList.remove('active');
            });
            document.getElementById('btn-' + mode).classList.add('active');
            
            frameContainer.className = 'frame-container mode-' + mode;
            imageSection.className = 'image-section ratio-' + mode + (hasImage ? ' has-image' : '');
            
            localStorage.setItem('frameMode', mode);
            showToast('Mode ' + mode.replace('169', '16:9').replace('916', '9:16').replace('11', '1:1'));
        }

        // Toggle Lock
        function toggleLock() {
            if (isCropMode) {
                toggleCropMode(); // Exit crop mode first
            }
            
            isLocked = !isLocked;
            document.body.classList.toggle('locked', isLocked);
            document.getElementById('lockToggle').classList.toggle('locked', isLocked);
            
            const lockIcon = document.getElementById('lockIcon');
            const lockText = document.getElementById('lockText');
            
            if (isLocked) {
                lockText.textContent = 'Locked';
                lockIcon.innerHTML = '<path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 15v2m-6 4h12a2 2 0 002-2v-6a2 2 0 00-2-2H6a2 2 0 00-2 2v6a2 2 0 002 2zm10-10V7a4 4 0 00-8 0v4h8z"></path>';
                saveData();
                showToast('Dikunci');
            } else {
                lockText.textContent = 'Edit';
                lockIcon.innerHTML = '<path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M8 11V7a4 4 0 118 0m-4 8v2m-6 4h12a2 2 0 002-2v-6a2 2 0 00-2-2H6a2 2 0 00-2 2v6a2 2 0 002 2z"></path>';
                showToast('Edit Mode');
            }
        }

        // Toggle Stats
        function toggleStats() {
            statsVisible = !statsVisible;
            document.getElementById('statsSection').classList.toggle('hidden', !statsVisible);
            document.getElementById('statsToggle').classList.toggle('active', statsVisible);
            document.getElementById('statsStatus').textContent = statsVisible ? 'On' : 'Off';
            localStorage.setItem('statsVisible', statsVisible);
        }

        // Image Upload
        function triggerUpload() {
            if (isLocked) {
                showToast('Unlock dulu');
                return;
            }
            if (isCropMode) {
                toggleCropMode();
            }
            fileInput.click();
        }

        function handleImage(event) {
            if (isLocked) return;
            
            const file = event.target.files[0];
            if (!file) return;
            
            if (file.size > 5 * 1024 * 1024) {
                showToast('File max 5MB');
                return;
            }
            
            const reader = new FileReader();
            reader.onload = function(e) {
                previewImage.src = e.target.result;
                imageWrapper.classList.add('active');
                imageSection.classList.add('has-image');
                uploadPlaceholder.style.display = 'none';
                imageActions.style.display = 'flex';
                hasImage = true;
                
                // Reset crop
                cropScale = 1;
                cropTranslateX = 0;
                cropTranslateY = 0;
                updateCropTransform();
                
                localStorage.setItem('savedImage', e.target.result);
                showToast('Upload berhasil');
            };
            reader.readAsDataURL(file);
        }

        // Toggle Crop Mode
        function toggleCropMode() {
            if (!hasImage || isLocked) return;
            
            isCropMode = !isCropMode;
            
            if (isCropMode) {
                cropBtn.classList.add('active');
                cropBtnText.textContent = 'Selesai';
                imageInner.classList.add('crop-mode');
                previewImage.classList.add('crop-active');
                cropInstructions.classList.add('show');
                setupCropEvents();
                showToast('Mode Sesuaikan Aktif');
            } else {
                cropBtn.classList.remove('active');
                cropBtnText.textContent = 'Sesuaikan';
                imageInner.classList.remove('crop-mode');
                previewImage.classList.remove('crop-active');
                cropInstructions.classList.remove('show');
                removeCropEvents();
                saveCropData();
                showToast('Crop disimpan');
            }
        }

        // Crop Transform
        function updateCropTransform() {
            previewImage.style.transform = `translate(${cropTranslateX}px, ${cropTranslateY}px) scale(${cropScale})`;
        }

        // Setup Crop Events
        function setupCropEvents() {
            // Touch events
            imageInner.addEventListener('touchstart', handleCropStart, { passive: false });
            imageInner.addEventListener('touchmove', handleCropMove, { passive: false });
            imageInner.addEventListener('touchend', handleCropEnd, { passive: true });
            
            // Mouse events
            imageInner.addEventListener('mousedown', handleCropStart);
            imageInner.addEventListener('mousemove', handleCropMove);
            imageInner.addEventListener('mouseup', handleCropEnd);
            imageInner.addEventListener('mouseleave', handleCropEnd);
            
            // Wheel zoom
            imageInner.addEventListener('wheel', handleWheel, { passive: false });
        }

        function removeCropEvents() {
            imageInner.removeEventListener('touchstart', handleCropStart);
            imageInner.removeEventListener('touchmove', handleCropMove);
            imageInner.removeEventListener('touchend', handleCropEnd);
            imageInner.removeEventListener('mousedown', handleCropStart);
            imageInner.removeEventListener('mousemove', handleCropMove);
            imageInner.removeEventListener('mouseup', handleCropEnd);
            imageInner.removeEventListener('mouseleave', handleCropEnd);
            imageInner.removeEventListener('wheel', handleWheel);
        }

        function handleCropStart(e) {
            e.preventDefault();
            isDragging = true;
            
            if (e.touches && e.touches.length === 2) {
                // Pinch zoom start
                initialDistance = getDistance(e.touches[0], e.touches[1]);
            } else {
                // Drag start
                const clientX = e.touches ? e.touches[0].clientX : e.clientX;
                const clientY = e.touches ? e.touches[0].clientY : e.clientY;
                startX = clientX;
                startY = clientY;
                initialTranslateX = cropTranslateX;
                initialTranslateY = cropTranslateY;
            }
        }

        function handleCropMove(e) {
            if (!isDragging) return;
            e.preventDefault();
            
            if (e.touches && e.touches.length === 2) {
                // Pinch zoom
                const distance = getDistance(e.touches[0], e.touches[1]);
                const scale = (distance / initialDistance) * cropScale;
                cropScale = Math.max(0.5, Math.min(3, scale));
            } else {
                // Drag
                const clientX = e.touches ? e.touches[0].clientX : e.clientX;
                const clientY = e.touches ? e.touches[0].clientY : e.clientY;
                const diffX = clientX - startX;
                const diffY = clientY - startY;
                cropTranslateX = initialTranslateX + diffX;
                cropTranslateY = initialTranslateY + diffY;
            }
            
            updateCropTransform();
        }

        function handleCropEnd() {
            isDragging = false;
        }

        function handleWheel(e) {
            e.preventDefault();
            const delta = e.deltaY > 0 ? 0.9 : 1.1;
            cropScale = Math.max(0.5, Math.min(3, cropScale * delta));
            updateCropTransform();
        }

        function getDistance(touch1, touch2) {
            const dx = touch1.clientX - touch2.clientX;
            const dy = touch1.clientY - touch2.clientY;
            return Math.sqrt(dx * dx + dy * dy);
        }

        function saveCropData() {
            const cropData = {
                scale: cropScale,
                x: cropTranslateX,
                y: cropTranslateY
            };
            localStorage.setItem('cropData', JSON.stringify(cropData));
        }

        function loadCropData() {
            const saved = localStorage.getItem('cropData');
            if (saved) {
                const data = JSON.parse(saved);
                cropScale = data.scale || 1;
                cropTranslateX = data.x || 0;
                cropTranslateY = data.y || 0;
                updateCropTransform();
            }
        }

        // Delete Image
        function deleteImage() {
            if (isLocked) return;
            if (isCropMode) toggleCropMode();
            
            previewImage.src = '';
            imageWrapper.classList.remove('active');
            imageSection.classList.remove('has-image');
            uploadPlaceholder.style.display = 'flex';
            imageActions.style.display = 'none';
            hasImage = false;
            
            cropScale = 1;
            cropTranslateX = 0;
            cropTranslateY = 0;
            updateCropTransform();
            
            localStorage.removeItem('savedImage');
            localStorage.removeItem('cropData');
            showToast('Gambar dihapus');
        }

        // Screenshot Mode
        function toggleScreenshot() {
            if (isCropMode) toggleCropMode();
            
            if (!isLocked) {
                toggleLock();
            }
            
            isScreenshotMode = !isScreenshotMode;
            document.body.classList.toggle('screenshot-mode', isScreenshotMode);
            
            if (isScreenshotMode) {
                if (document.documentElement.requestFullscreen) {
                    document.documentElement.requestFullscreen().catch(() => {});
                }
            } else {
                if (document.exitFullscreen) {
                    document.exitFullscreen().catch(() => {});
                }
            }
        }

        // Reset Modal
        function showResetModal() {
            document.getElementById('resetModal').classList.add('active');
        }

        function hideResetModal() {
            document.getElementById('resetModal').classList.remove('active');
        }

        function confirmReset() {
            localStorage.clear();
            hideResetModal();
            showToast('Reset berhasil');
            setTimeout(() => location.reload(), 500);
        }

        // Toast
        function showToast(message) {
            toast.textContent = message;
            toast.classList.add('show');
            setTimeout(() => toast.classList.remove('show'), 2000);
        }

        // Save Data
        function saveData() {
            const inputs = document.querySelectorAll('input[type="text"], textarea');
            const data = {};
            inputs.forEach((input, index) => {
                data[index] = input.value;
            });
            localStorage.setItem('formData', JSON.stringify(data));
            saveCropData();
        }

        // Load Data
        function loadData() {
            const savedMode = localStorage.getItem('frameMode');
            if (savedMode) {
                setMode(savedMode);
            }
            
            const savedStats = localStorage.getItem('statsVisible');
            if (savedStats === 'false') {
                statsVisible = false;
                document.getElementById('statsSection').classList.add('hidden');
                document.getElementById('statsToggle').classList.remove('active');
                document.getElementById('statsStatus').textContent = 'Off';
            }
            
            const savedData = localStorage.getItem('formData');
            if (savedData) {
                const data = JSON.parse(savedData);
                const inputs = document.querySelectorAll('input[type="text"], textarea');
                inputs.forEach((input, index) => {
                    if (data[index]) input.value = data[index];
                });
            }
            
            const savedImage = localStorage.getItem('savedImage');
            if (savedImage) {
                previewImage.src = savedImage;
                imageWrapper.classList.add('active');
                imageSection.classList.add('has-image');
                uploadPlaceholder.style.display = 'none';
                imageActions.style.display = 'flex';
                hasImage = true;
                loadCropData();
            }
        }

        // Auto save
        document.querySelectorAll('input, textarea').forEach(input => {
            input.addEventListener('input', () => {
                if (!isLocked) saveData();
            });
        });

        // Keyboard
        document.addEventListener('keydown', (e) => {
            if (e.key === 'F11' || (e.ctrlKey && e.key === 's')) {
                e.preventDefault();
                toggleScreenshot();
            }
            if (e.key === 'Escape') {
                if (isScreenshotMode) toggleScreenshot();
                hideResetModal();
                if (isCropMode) toggleCropMode();
            }
            if (e.ctrlKey && e.key === 'l') {
                e.preventDefault();
                toggleLock();
            }
        });

        // Close modal on overlay click
        
        document.getElementById('resetModal').addEventListener('click', (e) => {
            if (e.target === e.currentTarget) hideResetModal();
        });

        // Init
        window.addEventListener('load', loadData);
    </script>
</body>
</html>
